<head>
    <meta charset="utf-8">
    <title>stuff</title>
    <style>

    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.11/lodash.min.js"></script>
    <script>
        var num;
        var lowNum = -1;
        var i = parseInt(window.prompt(“Enter the amount of numbers: “));
        while(i > 0) {
            num = parseInt(window.prompt("Enter a number: ")));
            if(lowNum == -1)
                lowNum = num;
            if(num < lowNum)
                lowNum = num;
            i--;
        }
    </script>
